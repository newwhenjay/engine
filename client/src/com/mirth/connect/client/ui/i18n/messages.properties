connectors.sourceSettings.sourceQueue.tooltip=<html>Selecting OFF will process the message before sending the response (can use response from destinations)<br>Selecting ON will queue messages and immediately send a response (cannot use response from destinations)</html>
connectors.sourceSettings.queueUnsupported=Queuing is not supported by the current message storage mode.
connectors.sourceSettings.queueBufferSize=Queue Buffer Size:
connectors.sourceSettings.queueBufferSize.tooltip=<html>The buffer size for the source queue.<br/>Up to this many connector messages may<br/>be held in memory at once when queuing.</html>
connectors.sourceSettings.response=Response:
connectors.sourceSettings.response.tooltip=<html>Select a destination's response, the postprocessor return value, or a response map variable.<br/>Select <b>\"Auto-generate\"</b> to send a response generated by the inbound data type using the raw message:<br/>&nbsp;- <b>Before processing:</b> Response generated before the channel processes the message (SENT status)<br/>&nbsp;- <b>After source transformer:</b> Response generated after the channel processes the message (source status)<br/>&nbsp;- <b>Destinations completed:</b> Response generated after the channel processes the message, with a status<br/>&nbsp;&nbsp;&nbsp;&nbsp;based on the destination statuses, using a precedence of ERROR, QUEUED, SENT, FILTERED<br/></html>
connectors.sourceSettings.processBatch=Process Batch:
connectors.sourceSettings.yes=Yes
connectors.sourceSettings.no=No
connectors.sourceSettings.processBatch.tooltip=<html>Select Yes to enable batch processing. Batch messages are only supported if<br>the source connector's inbound properties contains a <b>Batch</b> section.</html>
connectors.sourceSettings.batchResponse=Batch Response:
connectors.sourceSettings.first=First
connectors.sourceSettings.last=Last
connectors.sourceSettings.batchResponse.tooltip=<html>Each message in the batch contains its own response that is generated via the method selected above.<br> Select either the response from the first or last message in the batch to be sent back to the originating system.</html>
connectors.sourceSettings.maxProcessingThreads=Max Processing Threads:
connectors.sourceSettings.maxProcessingThreads.tooltip=<html>The maximum number of messages that can process through<br/>the channel simultaneously. Note that when this value<br/>is greater than 1, message order is NOT guaranteed.</html>

