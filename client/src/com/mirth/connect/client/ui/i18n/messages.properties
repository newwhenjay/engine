reference.variable.connectorMessage=Connector Message
reference.variable.connectorMessage.desc=The current connector's ImmutableConnectorMessage object.
reference.variable.outboundMessageTransformed=Outbound Message (Transformed)
reference.variable.outboundMessageTransformed.desc=In a filter/transformer script, this represents the outbound template, serialized to an E4X XML object. If the outbound data type is Raw, this will instead be a string. If the outbound data type is JSON, this will be a JavaScript object.
reference.variable.responseObject=Response Object
reference.variable.responseObject.desc=In a response transformer script, this is the ImmutableResponse object associated with the response data.
reference.variable.responseStatus=Response Status
reference.variable.responseStatus.desc=In a response transformer script, this is the status which will be used to set the status of the corresponding connector message.
reference.variable.responseErrorMessage=Response Error Message
reference.variable.responseErrorMessage.desc=In a response transformer script, this is the error message which will be used to set the error content of the corresponding connector message.
reference.variable.responseStatusMessage=Response Status Message
reference.variable.responseStatusMessage.desc=In a response transformer script, this is a brief message explaning the reason for the current status.
reference.map.connectorMap=Connector Map
reference.map.connectorMap.desc=The variable map associated with the current connector. Values placed in this map will not persist to other connectors.
reference.map.channelMap=Channel Map
reference.map.channelMap.desc=The variable map associated with the current message. Values placed in this map will be accessible to downstream connectors and the postprocessor, but will not be accessible to subsequent messages.
reference.map.sourceMap=Source Map
reference.map.sourceMap.desc=The read-only variable map associated with the current message. Values are placed in this map at the beginning of the message lifecycle (e.g. "originalFilename").
reference.map.globalMap=Global Map
reference.map.globalMap.desc=The global variable map. Values placed in this map will be accessible throughout the entire server.
reference.map.globalChannelMap=Global Channel Map
reference.map.globalChannelMap.desc=The variable map associated with the current channel. Values placed in this map will be accessible throughout the entire channel, and across multiple messages.
reference.map.configurationMap=Configuration Map
reference.map.configurationMap.desc=The variable map associated with the current server instance. Values placed in this map will be accessible thoughout the entire server. These values can also be edited on the corresponding settings view.
reference.map.responseMap=Response Map
reference.map.responseMap.desc=The variable map used to store Response objects for the current message. Values placed in this map may be used to respond to an originating system with. Subsequent destination connectors may also reference these values.
reference.variable.logger=log4j Logger
reference.variable.logger.desc=This object can be used to send messages to the server log.
reference.variable.alertSender=AlertSender
reference.variable.alertSender.desc=An instance of AlertSender that can be used to trigger User Defined Transformer events which can be captured by alerts.
reference.variable.router=VMRouter
reference.variable.router.desc=An instance of VMRouter that can be used to dispatch messages to other channels.
reference.variable.replacer=TemplateValueReplacer
reference.variable.replacer.desc=An instance of TemplateValueReplacer that can be used to perform Velocity template replacement.
reference.variable.reader=Batch Reader
reference.variable.reader.desc=In a JavaScript batch script, this BufferedReader object is used to read the incoming data stream.
reference.variable.contextFactory=JavaScript Context Factory
reference.variable.contextFactory.desc=This object can be used to retrieve the resource IDs and classloaders used by the current JavaScript context.

