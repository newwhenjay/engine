connectors.httpListener.tooltip.plainBody=<html>If selected, the request body will be sent to the channel as a raw string.</html>
connectors.httpListener.tooltip.xmlBody=<html>If selected, the request body will be sent to the channel as serialized XML.</html>
connectors.httpListener.tooltip.responseContentType=The MIME type to be used for the response.
connectors.httpListener.tooltip.charsetEncoding=<html>Select the character set encoding to be used for the response to the sending system.<br>Set to Default to assume the default character set encoding for the JVM running {0}.</html>
connectors.httpListener.tooltip.baseContextPath=The context path for the HTTP Listener URL.
connectors.httpListener.tooltip.receiveTimeout=Enter the maximum idle time in milliseconds for a connection.
connectors.httpListener.tooltip.httpUrl=<html>Displays the generated HTTP URL for the HTTP Listener.</html>
connectors.httpListener.tooltip.responseStatusCode=<html>Enter the status code for the HTTP response.  If this field is left blank a <br>default status code of 200 will be returned for a successful message, <br>and 500 will be returned for an errored message. If a \"Respond from\" <br>value is chosen, that response will be used to determine a successful <br>or errored response.<html>
connectors.httpListener.tooltip.parseMultipart=<html>Select Yes to automatically parse multipart requests into separate XML nodes.<br/>Select No to always keep the request body as a single XML node.</html>
connectors.httpListener.tooltip.includeMetadata=<html>Select Yes to include request metadata (method, context path, headers,<br/>query parameters) in the XML content. Note that regardless of this<br/>setting, the same metadata is always available in the source map.</html>
connectors.httpListener.tooltip.staticResources=<html>Values in this table are automatically sent back to any request<br/>with the matching context path. There are three resource types:<br/> - <b>File</b>: The value field specifies the path of the file to return.<br/> - <b>Directory</b>: Any file within the directory given by the value<br/>&nbsp;&nbsp;&nbsp;field may be requested, but subdirectories are not included.<br/> - <b>Custom</b>: The value field itself is returned as the response.<br/></html>
connectors.httpListener.tooltip.responseDataType=<html>If Binary is selected, responses will be decoded from Base64 into raw byte streams.<br/>If Text is selected, responses will be encoded with the specified character set encoding.</html>
connectors.httpListener.tooltip.binaryMimeTypes=<html>When a response comes in with a Content-Type header that<br/>matches one of these entries, the content will be encoded<br/>into a Base64 string. If Regular Expression is unchecked,<br/>specify multiple entries with commas. Otherwise, enter a<br/>valid regular expression to match MIME types against.</html>
connectors.httpListener.tooltip.useTable=<html>The table below will be used to populate response headers.</html>
connectors.httpListener.tooltip.useMap=<html>The Java map specified by the following variable will be used to populate response headers.<br/>The map must have String keys and either String or List&lt;String&gt; values.</html>
connectors.httpListener.tooltip.useMap.var=<html>The variable of a Java map to use to populate response headers.<br/>The map must have String keys and either String or List&lt;String&gt; values.</html>

