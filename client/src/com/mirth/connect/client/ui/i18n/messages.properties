connectors.destinationSettings.reattachAttachments=Reattach Attachments:
connectors.destinationSettings.reattachAttachments.tooltip=<html>If enabled, replacement tokens using the ${ATTACH:...} syntax will<br/>automatically be replaced with the associated attachment content<br/>before the message is sent. If disabled, the tokens will be<br/>expanded to the full ${ATTACH:channelId:messageId:attachmentId}<br/>syntax which can then be reattached in downstream channels.</html>

connectors.destinationSettings.advancedDialog.title=Settings
connectors.destinationSettings.advancedDialog.panelTitle=Advanced Queue Settings
connectors.destinationSettings.advancedDialog.retryCount=Retry Count Before Queue/Error:
connectors.destinationSettings.advancedDialog.retryCount.tooltip=<html>The maximum number of times the connector will attempt to send<br/>the message before queueing or erroring.</html>
connectors.destinationSettings.advancedDialog.retryInterval=Retry Interval (ms):
connectors.destinationSettings.advancedDialog.retryInterval.tooltip=<html>The amount of time that should elapse between retry attempts to send<br/>messages. This interval applies to both the queue and initial retry attempts.</html>
connectors.destinationSettings.advancedDialog.regenerateTemplate=Regenerate Template:
connectors.destinationSettings.advancedDialog.regenerateTemplate.tooltip=<html>Regenerate the template and other connector properties by replacing variables<br/>each time the connector attempts to send the message from the queue. If this is<br/>disabled, the original variable replacements will be used for each attempt.</html>
connectors.destinationSettings.advancedDialog.rotateQueue=Rotate Queue:
connectors.destinationSettings.advancedDialog.rotateQueue.tooltip=<html>If enabled, when any message fails to be sent from the queue, the connector will<br/>place the message at the end of the queue and attempt to send the next message.<br/>This will prevent a single message from holding up the entire queue. If the order<br/>of messages processed is important, this should be disabled.</html>
connectors.destinationSettings.advancedDialog.includeFilterTransformer=Include Filter/Transformer:
connectors.destinationSettings.advancedDialog.includeFilterTransformer.tooltip=<html>If enabled, the filter and transformer will be re-executed<br/>before every queue send attempt. This is only available<br/>when the Regenerate Template setting is enabled.</html>
connectors.destinationSettings.advancedDialog.queueThreads=Queue Threads:
connectors.destinationSettings.advancedDialog.queueThreads.tooltip=<html>The number of threads that will read from the queue and dispatch<br/>messages simultaneously. Message order is NOT guaranteed if this<br/>value is greater than one, unless an assignment variable is used below.</html>
connectors.destinationSettings.advancedDialog.threadAssignmentVariable=Thread Assignment Variable:
connectors.destinationSettings.advancedDialog.threadAssignmentVariable.tooltip=<html>When using multiple queue threads, this map variable<br/>determines how to assign messages to specific threads.<br/>If rotation is disabled, messages with the same thread<br/>assignment value will always be processed in order.</html>
connectors.destinationSettings.advancedDialog.queueBufferSize=Queue Buffer Size:
connectors.destinationSettings.advancedDialog.queueBufferSize.tooltip=<html>The buffer size for the destination queue.<br/>Up to this many connector messages may<br/>be held in memory at once when queuing.</html>
